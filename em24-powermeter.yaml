esphome:
  name: esphome-modbus-em24-powermeter
  friendly_name: EspHome Modbus EM24 Powermeter

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Logging auf WARN-Level — reduziert Traffic, behält Fehlermeldungen
logger:
  level: WARN

# Home Assistant API mit verschlüsselter Verbindung
api:
  encryption:
    key: !secret api_encryption_key  # In secrets.yaml auslagern

# OTA-Updates über ESPHome
ota:
  - platform: esphome
    password: !secret ota_password   # In secrets.yaml auslagern

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Einfaches Web-Interface für direkten Zugriff im lokalen Netz
web_server:
  port: 80

# UART-Bus für Modbus RTU (RS485)
# ESP32-C3: TX=GPIO4, RX=GPIO3 — 9600 Baud, 8N1
uart:
  id: mod_bus
  tx_pin: 4
  rx_pin: 3
  baud_rate: 9600
  stop_bits: 1

# Modbus RTU Master
modbus:
  id: modbus1

# Carlo Gavazzi EM24 Energiezähler
# Modbus-Adresse: 0x01 (Werkseinstellung)
# Update-Intervall: 10 Sekunden
modbus_controller:
  - id: EM24
    address: 0x1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s

sensor:
  # Momentanleistung Heizung
  # Register 0x28 (DWORD, Big-Endian) — Einheit: 0.1 W → Faktor 0.1 → W
  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_heating"
    id: power_heating
    address: 0x28
    device_class: power
    state_class: measurement
    icon: mdi:heat-pump
    unit_of_measurement: "W"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Gesamtenergie Heizung (Zählerstand)
  # Register 0x3E (DWORD, Big-Endian) — Einheit: 0.1 kWh → Faktor 0.1 → kWh
  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "energy_heating"
    id: energy_heating
    address: 0x3E
    device_class: energy
    state_class: total_increasing
    icon: mdi:transmission-tower-export
    unit_of_measurement: "kWh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Netzfrequenz
  # Register 0x37 (WORD, signed) — Einheit: 0.1 Hz → Faktor 0.1 → Hz
  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "frequency_internal"
    id: frequency_internal
    address: 0x37
    device_class: frequency    # KORRIGIERT: war fälschlicherweise "power"
    state_class: measurement
    icon: mdi:sine-wave        # KORRIGIERT: passendes Icon für Frequenz
    unit_of_measurement: "Hz"
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
