esphome:
  name: esphome-modbus-em24-powermeter
  friendly_name: EspHome Modbus EM24 Powermeter

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Logging auf WARN-Level — reduziert Traffic, behält Fehlermeldungen
logger:
  level: WARN

# Home Assistant API mit verschlüsselter Verbindung
api:
  encryption:
    key: !secret api_encryption_key

# OTA-Updates über ESPHome
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Einfaches Web-Interface für direkten Zugriff im lokalen Netz
web_server:
  port: 80

# UART-Bus für Modbus RTU (RS485)
# ESP32-C3: TX=GPIO4, RX=GPIO3 — 9600 Baud, 8N1
uart:
  id: mod_bus
  tx_pin: 4
  rx_pin: 3
  baud_rate: 9600
  stop_bits: 1

# Modbus RTU Master
modbus:
  id: modbus1

# Carlo Gavazzi EM24 Energiezähler
# Modbus-Adresse: 0x01 (Werkseinstellung)
# Update-Intervall: 10 Sekunden
# Hinweis: Registeradressen gelten für EM24-DIN AV5 3(O)5 X O1 PF A
# Bei anderen Modellvarianten bitte mit dem Datenblatt abgleichen
modbus_controller:
  - id: EM24
    address: 0x1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s

sensor:

  # ═══════════════════════════════════════════════════════════════
  # SPANNUNGEN — Phasen gegen Neutralleiter (L-N)
  # Auflösung: 0.1 V | Typ: S_DWORD_R (32-Bit, signed)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l1_n"
    id: voltage_l1_n
    address: 0x0000
    device_class: voltage
    state_class: measurement
    icon: mdi:flash
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l2_n"
    id: voltage_l2_n
    address: 0x0002
    device_class: voltage
    state_class: measurement
    icon: mdi:flash
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l3_n"
    id: voltage_l3_n
    address: 0x0004
    device_class: voltage
    state_class: measurement
    icon: mdi:flash
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # SPANNUNGEN — Leiter-Leiter (L-L)
  # Auflösung: 0.1 V | Typ: S_DWORD_R (32-Bit, signed)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l1_l2"
    id: voltage_l1_l2
    address: 0x0006
    device_class: voltage
    state_class: measurement
    icon: mdi:flash-triangle
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l2_l3"
    id: voltage_l2_l3
    address: 0x0008
    device_class: voltage
    state_class: measurement
    icon: mdi:flash-triangle
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "voltage_l3_l1"
    id: voltage_l3_l1
    address: 0x000A
    device_class: voltage
    state_class: measurement
    icon: mdi:flash-triangle
    unit_of_measurement: "V"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # STRÖME — Phasenströme
  # Auflösung: 1 mA → multiply: 0.001 → A | Typ: S_DWORD_R (32-Bit, signed)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "current_l1"
    id: current_l1
    address: 0x000C
    device_class: current
    state_class: measurement
    icon: mdi:current-ac
    unit_of_measurement: "A"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "current_l2"
    id: current_l2
    address: 0x000E
    device_class: current
    state_class: measurement
    icon: mdi:current-ac
    unit_of_measurement: "A"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "current_l3"
    id: current_l3
    address: 0x0010
    device_class: current
    state_class: measurement
    icon: mdi:current-ac
    unit_of_measurement: "A"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # ═══════════════════════════════════════════════════════════════
  # WIRKLEISTUNG — pro Phase (Active Power)
  # Auflösung: 0.1 W | Typ: S_DWORD_R (negativ = Einspeisung)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_l1"
    id: power_l1
    address: 0x0012
    device_class: power
    state_class: measurement
    icon: mdi:lightning-bolt
    unit_of_measurement: "W"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_l2"
    id: power_l2
    address: 0x0014
    device_class: power
    state_class: measurement
    icon: mdi:lightning-bolt
    unit_of_measurement: "W"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_l3"
    id: power_l3
    address: 0x0016
    device_class: power
    state_class: measurement
    icon: mdi:lightning-bolt
    unit_of_measurement: "W"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # SCHEINLEISTUNG — pro Phase (Apparent Power)
  # Auflösung: 0.1 VA | Typ: U_DWORD_R (immer positiv)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "apparent_power_l1"
    id: apparent_power_l1
    address: 0x0018
    device_class: apparent_power
    state_class: measurement
    icon: mdi:lightning-bolt-outline
    unit_of_measurement: "VA"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "apparent_power_l2"
    id: apparent_power_l2
    address: 0x001A
    device_class: apparent_power
    state_class: measurement
    icon: mdi:lightning-bolt-outline
    unit_of_measurement: "VA"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "apparent_power_l3"
    id: apparent_power_l3
    address: 0x001C
    device_class: apparent_power
    state_class: measurement
    icon: mdi:lightning-bolt-outline
    unit_of_measurement: "VA"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # BLINDLEISTUNG — pro Phase (Reactive Power)
  # Auflösung: 0.1 VAr | Typ: S_DWORD_R (negativ = kapazitiv)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_power_l1"
    id: reactive_power_l1
    address: 0x001E
    device_class: reactive_power
    state_class: measurement
    icon: mdi:sine-wave
    unit_of_measurement: "VAr"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_power_l2"
    id: reactive_power_l2
    address: 0x0020
    device_class: reactive_power
    state_class: measurement
    icon: mdi:sine-wave
    unit_of_measurement: "VAr"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_power_l3"
    id: reactive_power_l3
    address: 0x0022
    device_class: reactive_power
    state_class: measurement
    icon: mdi:sine-wave
    unit_of_measurement: "VAr"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # LEISTUNGSFAKTOR — pro Phase (Power Factor)
  # Auflösung: 0.001 | Typ: S_WORD (16-Bit, signed)
  # Wertebereich: -1.000 bis +1.000 (negativ = Einspeisung/kapazitiv)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_factor_l1"
    id: power_factor_l1
    address: 0x0024
    device_class: power_factor
    state_class: measurement
    icon: mdi:angle-acute
    unit_of_measurement: ""
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_factor_l2"
    id: power_factor_l2
    address: 0x0025
    device_class: power_factor
    state_class: measurement
    icon: mdi:angle-acute
    unit_of_measurement: ""
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_factor_l3"
    id: power_factor_l3
    address: 0x0026
    device_class: power_factor
    state_class: measurement
    icon: mdi:angle-acute
    unit_of_measurement: ""
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # ═══════════════════════════════════════════════════════════════
  # GESAMT-WIRKLEISTUNG (Total Active Power)
  # Auflösung: 0.1 W | Typ: U_DWORD_R
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_total"
    id: power_total
    address: 0x0028
    device_class: power
    state_class: measurement
    icon: mdi:heat-pump
    unit_of_measurement: "W"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # GESAMT-SCHEINLEISTUNG (Total Apparent Power)
  # Auflösung: 0.1 VA | Typ: U_DWORD_R
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "apparent_power_total"
    id: apparent_power_total
    address: 0x002A
    device_class: apparent_power
    state_class: measurement
    icon: mdi:lightning-bolt-outline
    unit_of_measurement: "VA"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # GESAMT-BLINDLEISTUNG (Total Reactive Power)
  # Auflösung: 0.1 VAr | Typ: S_DWORD_R (negativ = kapazitiv)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_power_total"
    id: reactive_power_total
    address: 0x002C
    device_class: reactive_power
    state_class: measurement
    icon: mdi:sine-wave
    unit_of_measurement: "VAr"
    register_type: read
    value_type: S_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # GESAMT-LEISTUNGSFAKTOR (Total Power Factor)
  # Auflösung: 0.001 | Typ: S_WORD (16-Bit, signed)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "power_factor_total"
    id: power_factor_total
    address: 0x002E
    device_class: power_factor
    state_class: measurement
    icon: mdi:angle-acute
    unit_of_measurement: ""
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # ═══════════════════════════════════════════════════════════════
  # NETZFREQUENZ (Frequency)
  # Auflösung: 0.1 Hz | Typ: S_WORD (16-Bit, signed)
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "frequency"
    id: frequency
    address: 0x0037
    device_class: frequency
    state_class: measurement
    icon: mdi:sine-wave
    unit_of_measurement: "Hz"
    register_type: read
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # ENERGIE — Wirkenergie Import/Export (Active Energy)
  # Auflösung: 0.1 kWh | Typ: U_DWORD_R (32-Bit, unsigned)
  # ═══════════════════════════════════════════════════════════════

  # Wirkenergie Import (Bezug aus dem Netz)
  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "energy_import"
    id: energy_import
    address: 0x003C
    device_class: energy
    state_class: total_increasing
    icon: mdi:transmission-tower-import
    unit_of_measurement: "kWh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Wirkenergie Export (Einspeisung ins Netz) oder Teilzähler je nach Modell
  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "energy_export"
    id: energy_export
    address: 0x003E
    device_class: energy
    state_class: total_increasing
    icon: mdi:transmission-tower-export
    unit_of_measurement: "kWh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # ═══════════════════════════════════════════════════════════════
  # ENERGIE — Blindenergie (Reactive Energy)
  # Auflösung: 0.1 kVArh | Typ: U_DWORD_R (32-Bit, unsigned)
  # Q1 = induktiv/import | Q2 = kapazitiv/import
  # Q3 = induktiv/export | Q4 = kapazitiv/export
  # ═══════════════════════════════════════════════════════════════

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_energy_q1"
    id: reactive_energy_q1
    address: 0x0040
    device_class: energy
    state_class: total_increasing
    icon: mdi:chart-bell-curve
    unit_of_measurement: "kVArh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_energy_q2"
    id: reactive_energy_q2
    address: 0x0042
    device_class: energy
    state_class: total_increasing
    icon: mdi:chart-bell-curve
    unit_of_measurement: "kVArh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_energy_q3"
    id: reactive_energy_q3
    address: 0x0044
    device_class: energy
    state_class: total_increasing
    icon: mdi:chart-bell-curve
    unit_of_measurement: "kVArh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: EM24
    name: "reactive_energy_q4"
    id: reactive_energy_q4
    address: 0x0046
    device_class: energy
    state_class: total_increasing
    icon: mdi:chart-bell-curve
    unit_of_measurement: "kVArh"
    register_type: read
    value_type: U_DWORD_R
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
